<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Generatore Preventivi PDF</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="header">
            <img src="assets/logo.jpeg" alt="Logo">
            <h1>Generatore Preventivi</h1>
            <p class="subtitle">Crea preventivi professionali in pochi secondi</p>
        </div>

        <div class="card">

            <form id="form-preventivo">

                <h2>Dati Cliente</h2>

                <label>Cliente</label>
                <input type="text" name="cliente" required>

                <label>Data</label>
                <input type="date" name="data" required>

                <h2>Voci del Preventivo</h2>

                <div id="voci-container" class="voci-box">
                    <div class="voce">
                        <input type="text" placeholder="Descrizione" class="descrizione">
                        <input type="number" placeholder="Qta" class="qta">
                        <input type="number" step="0.01" placeholder="Prezzo" class="prezzo">
                    </div>
                </div>

                <button type="button" id="aggiungi-voce" class="btn-secondary">+ Aggiungi voce</button>

                <h2>Totale</h2>

                <input type="number" step="0.01" name="totale" required>

                <button type="submit" class="btn-primary">Genera PDF</button>

            </form>

        </div>

    </div>

    <script>
        const form = document.getElementById('form-preventivo');
        const vociContainer = document.getElementById('voci-container');
        const btnAggiungiVoce = document.getElementById('aggiungi-voce');

        btnAggiungiVoce.addEventListener('click', () => {
            const div = document.createElement('div');
            div.classList.add('voce');
            div.innerHTML = `
                <input type="text" placeholder="Descrizione" class="descrizione">
                <input type="number" placeholder="Qta" class="qta">
                <input type="number" step="0.01" placeholder="Prezzo" class="prezzo">
            `;
            vociContainer.appendChild(div);
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); // IMPORTANTISSIMO

            const formData = new FormData(form);

            const voci = [];
            document.querySelectorAll('.voce').forEach(voceDiv => {
                const descrizione = voceDiv.querySelector('.descrizione').value;
                const qta = voceDiv.querySelector('.qta').value;
                const prezzo = voceDiv.querySelector('.prezzo').value;

                if (descrizione && qta && prezzo) {
                    voci.push({ descrizione, qta, prezzo });
                }
            });

            const payload = {
                cliente: formData.get('cliente'),
                data: formData.get('data'),
                totale: formData.get('totale'),
                voci: JSON.stringify(voci)
            };

            const response = await fetch('/genera-preventivo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'preventivo.pdf';
            document.body.appendChild(a);
            a.click();
            a.remove();
        });
    </script>

</body>
</html>
