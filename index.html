<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Generatore Preventivi PDF</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="header">
            <img src="assets/logo.jpeg" alt="Logo">
            <h1>Generatore Preventivi</h1>
            <p class="subtitle">Crea preventivi professionali in pochi secondi</p>
        </div>

        <div class="card">

            <form id="form-preventivo">

                <h2>Dati Cliente</h2>

                <label>Cliente</label>
                <input type="text" name="cliente" required>

                <label>Data</label>
                <input type="date" name="data" required>

                <h2>Voci del Preventivo</h2>

                <div id="voci-container" class="voci-box">
                    <div class="voce">
                        <input type="text" placeholder="Descrizione" class="descrizione">
                        <input type="number" placeholder="Qta" class="qta">
                        <input type="number" step="0.01" placeholder="Prezzo" class="prezzo">
                    </div>
                </div>

                <button type="button" id="aggiungi-voce" class="btn-secondary">+ Aggiungi voce</button>

                <h2>Totale</h2>

                <input type="number" step="0.01" name="totale" required>

                <button type="submit" class="btn-primary">Genera PDF</button>

            </form>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
